<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operator</title>
</head>
<body>
    <h1>Operator Lessons</h1>

    <script>

        //assign operator
        var name = "Kyaw Phyo Wai";


        // addition operator
        var three = 1 + 2;
        document.write(three);
        document.write("<br>");
        var five = three + 2;
        document.write(five);
        document.write("<br>");

        var oneThree = 1 + '3';
        document.write(oneThree);

        document.write("<br>");
        let number = 7;
        document.write(number);
        number += 383;
        document.write("<br>");
        document.write(number);
    </script>
</body>
</html>
